<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Digital gift cards">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.75" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#grid)"/>
  <rect width="1200" height="340" fill="url(#glow)"/>

  <!-- Decorative dots column -->
  <g fill="#38BDF8" opacity="0.5">
    <circle cx="60"  cy="60"  r="2"/>
    <circle cx="60"  cy="92"  r="1.5"/>
    <circle cx="60"  cy="124" r="1"/>
    <circle cx="60"  cy="156" r="2.5"/>
  </g>

  <!-- Card 3 (back, dark) -->
  <g transform="translate(820 60) rotate(-10)">
    <rect width="280" height="170" rx="14" fill="url(#card3)" stroke="#334155" stroke-width="1"/>
    <rect x="22" y="24" width="44" height="30" rx="4" fill="#FACC15" opacity="0.85"/>
    <text x="22" y="138" font-family="'IBM Plex Mono','Courier New',monospace" font-size="12" fill="#94A3B8" letter-spacing="2">**** **** **** 0420</text>
  </g>

  <!-- Card 2 (mid, cool white) -->
  <g transform="translate(720 100) rotate(-3)">
    <rect width="280" height="170" rx="14" fill="url(#card2)" stroke="#94A3B8" stroke-width="1"/>
    <circle cx="40" cy="40" r="8" fill="#0F172A"/>
    <circle cx="58" cy="40" r="8" fill="#38BDF8" opacity="0.85"/>
    <text x="22" y="138" font-family="'IBM Plex Mono','Courier New',monospace" font-size="11" fill="#475569" letter-spacing="2">VALID THRU 04/29</text>
  </g>

  <!-- Card 1 (front, sky) -->
  <g transform="translate(620 130) rotate(4)">
    <rect width="280" height="170" rx="14" fill="url(#card1)"/>
    <rect x="20" y="20" width="46" height="34" rx="5" fill="#FACC15"/>
    <path d="M22 20h12v34H22z M30 20h6v34h-6z M40 20h4v34h-4z M48 20h2v34h-2z M54 20h6v34h-6z M64 20h2v34h-2z" fill="#0F172A" opacity="0.4"/>
    <text x="20" y="142" font-family="'Chakra Petch','Helvetica',sans-serif" font-size="22" font-weight="700" fill="#0B1220" letter-spacing="4">NEOGEN</text>
    <text x="20" y="158" font-family="'IBM Plex Mono','Courier New',monospace" font-size="10" fill="#0B1220" opacity="0.7" letter-spacing="2">DIGITAL CARD · KSA</text>
  </g>

  <!-- Type stack on left -->
  <g transform="translate(80 110)">
    <text x="0" y="0" font-family="'IBM Plex Mono','Courier New',monospace" font-size="12" fill="#38BDF8" letter-spacing="4">DIGITAL CARDS · INSTANT</text>
    <text x="0" y="64" font-family="'Rakkas','Tajawal',sans-serif" font-size="56" font-weight="400" fill="#F8FAFC" direction="rtl">بطاقات رقمية</text>
    <text x="0" y="106" font-family="'Tajawal','Helvetica',sans-serif" font-size="16" fill="#94A3B8" direction="rtl">14 علامة · تسليم فوري · ضمان رسمي</text>
    <g transform="translate(0 132)">
      <rect width="148" height="38" rx="19" fill="#38BDF8"/>
      <text x="74" y="24" font-family="'Tajawal','Helvetica',sans-serif" font-size="14" font-weight="700" fill="#0B1220" text-anchor="middle">تسوّق الآن</text>
    </g>
    <text x="170" y="156" font-family="'IBM Plex Mono','Courier New',monospace" font-size="11" fill="#64748B" letter-spacing="2">SAR · MADA · APPLE PAY</text>
  </g>

  <!-- Bottom rule + ID -->
  <g>
    <line x1="80" y1="300" x2="1120" y2="300" stroke="#1E293B" stroke-width="1"/>
    <text x="80"   y="320" font-family="'IBM Plex Mono','Courier New',monospace" font-size="10" fill="#64748B" letter-spacing="3">NG · GIFT-CARDS · R6</text>
    <text x="1120" y="320" font-family="'IBM Plex Mono','Courier New',monospace" font-size="10" fill="#64748B" letter-spacing="3" text-anchor="end">v1.36.0 · 2026-04</text>
  </g>
</svg>
