<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="بطاقات رقمية">
  <defs>
    <linearGradient id="bg-gift-cards" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <pattern id="dots-gift-cards" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#CBD5E1" opacity="0.7"/>
    </pattern>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg-gift-cards)"/>
  <rect width="200" height="200" rx="16" fill="url(#dots-gift-cards)"/>
  <rect x="8" y="8" width="184" height="184" rx="12" fill="none" stroke="#0F172A" stroke-width="0.6" opacity="0.08"/>
  <g transform="translate(100 92)">
    <g stroke="#0F172A" stroke-width="2" fill="none" stroke-linejoin="round">
      <rect x="-36" y="-22" width="72" height="44" rx="6" fill="#38BDF8"/>
