      <line x1="-30" y1="6"  x2="20" y2="6"  stroke="#0F172A" stroke-opacity="0.5"/>
      <line x1="-30" y1="14" x2="10" y2="14" stroke="#0F172A" stroke-opacity="0.3"/>
    </g></g>
  <g transform="translate(100 168)">
    <text x="0" y="0" font-family="'Rakkas','Tajawal',sans-serif" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">بطاقات رقمية</text>
  </g>
  <text x="14" y="24" font-family="'IBM Plex Mono','Courier New',monospace" font-size="7" fill="#0F172A" opacity="0.45" letter-spacing="1.5">NG · GIFT-CARDS</text>
</svg>
